<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">

<style>
* { font-family: 'Gloria Hallelujah', cursive; }

body {
  background: white;
  margin: 0;
  text-align: center;
  overflow-x: hidden;
}

.screen1 { margin-top: 120px; }

.title-box {
  display: inline-block;
  padding: 12px 20px;
  border: 2px solid #d9534f;
  color: #d9534f;
  border-radius: 6px;
  box-shadow: 0 0 15px #ff9aa2;
  margin-bottom: 20px;
}

.choice-btn, button {
  padding: 12px 25px;
  margin: 10px;
  border: 2px solid #d9534f;
  background: transparent;
  color: #d9534f;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 15px #ff9aa2;
  transition: 0.3s;
}

.choice-btn:hover, button:hover {
  box-shadow: 0 0 30px #ff6f91;
  background: #d9534f;
  color: white;
}

#envelope {
  display: none;
  position: relative;
  width: 280px;
  height: 180px;
  margin: 80px auto;
  background-color: #d9534f;
  border-radius: 6px;
  box-shadow: 0 0 30px #ff6f91;
}

.front { position: absolute; }

.flap {
  border-left: 140px solid transparent;
  border-right: 140px solid transparent;
  border-bottom: 82px solid transparent;
  border-top: 98px solid #d9534f;
}

.pocket {
  border-left: 140px solid #f5a3a2;
  border-right: 140px solid #f5a3a2;
  border-bottom: 90px solid #ff6f61;
  border-top: 90px solid transparent;
}

/* HEART */
.heart-beat {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  transform: translate(-50%, -50%) rotate(-45deg);
  background: red;
  animation: beat 1s infinite;
}

.heart-beat::before,
.heart-beat::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart-beat::before { top: -10px; left: 0; }
.heart-beat::after { left: 10px; top: 0; }

@keyframes beat {
  0%,100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.2); }
}

/* LETTER */
.letter {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow-y: auto;
  padding: 50px 25px;
  font-size: 18px;
  line-height: 1.7;
  color: #ff6f91;

  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.9s ease, opacity 0.6s;
  opacity: 0;

  background:
    radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(#fff, #fff);
  background-size: 4px 4px, 100% 100%;

  box-shadow: inset 0 0 80px rgba(255,105,135,0.6);
}

.open .letter {
  transform: scaleY(1);
  opacity: 1;
}

/* PAPER SHADOW ANIMATION */
.open .letter {
  animation: unfoldShadow 0.9s ease;
}

@keyframes unfoldShadow {
  0% { box-shadow: inset 0 -80px 120px rgba(0,0,0,0.2); }
  100% { box-shadow: inset 0 0 80px rgba(255,105,135,0.6); }
}

/* BUTTONS */
.buttons {
  display: none;
  position: fixed;
  bottom: 20px;
  width: 100%;
}

/* SPARKLES */
.sparkle {
  position: fixed;
  font-size: 14px;
  color: pink;
  pointer-events: none;
  animation: sparkle 1s linear forwards;
}

@keyframes sparkle {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3) translateY(-20px); }
}

</style>
</head>

<body>

<div class="screen1" id="screen1">
  <div class="title-box">WILL YOU READ IT?</div><br>
  <button class="choice-btn" onclick="start()">YES</button>
  <button class="choice-btn" onclick="start()">YES</button>
</div>

<div id="envelope">
  <div class="heart-beat"></div>
  <div class="front flap"></div>
  <div class="front pocket"></div>
</div>

<div class="letter" id="letter">
  <p id="typedText"></p>
</div>

<div class="buttons" id="buttons">
  <button onclick="openLetter()">OPEN</button>
  <button onclick="closeLetter()">CLOSE</button>
</div>

<script>
const fullText = `paste your full letter here...`;

let words = fullText.split(" ");
let index = 0;

// subtle typing sound
const audio = new Audio("https://www.soundjay.com/mechanical/typewriter-key-1.mp3");
audio.volume = 0.1;

function typeEffect() {
  const el = document.getElementById("typedText");
  el.innerHTML = "";
  index = 0;

  let interval = setInterval(() => {
    if (index < words.length) {
      el.innerHTML += words[index] + " ";
      audio.currentTime = 0;
      audio.play();
      index++;
    } else {
      clearInterval(interval);
    }
  }, 90);
}

function start() {
  document.getElementById('screen1').style.display = 'none';
  document.getElementById('envelope').style.display = 'block';
  document.getElementById('buttons').style.display = 'block';
}

function openLetter() {
  document.body.classList.add('open');

  setTimeout(() => {
    document.getElementById('envelope').style.display = 'none';
    typeEffect();
  }, 300);

  createSparkles();
}

function closeLetter() {
  document.getElementById('envelope').style.display = 'block';
  setTimeout(() => {
    document.body.classList.remove('open');
  }, 50);
}

/* SPARKLE TRAIL (MOBILE + PC) */
function createSparkles(x = window.innerWidth/2, y = window.innerHeight/2) {
  for (let i = 0; i < 20; i++) {
    let s = document.createElement('div');
    s.className = 'sparkle';
    s.innerHTML = '✦';
    s.style.left = (x + Math.random()*50-25) + 'px';
    s.style.top = (y + Math.random()*50-25) + 'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

window.addEventListener('touchmove', e => {
  let t = e.touches[0];
  createSparkles(t.clientX, t.clientY);
});

window.addEventListener('mousemove', e => {
  createSparkles(e.clientX, e.clientY);
});

</script>

</body>
</html>
